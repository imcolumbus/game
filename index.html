    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // 파스텔톤 배경색 리스트 (눈이 편안한 색상)
        const pastelBackgrounds = ['#FFF5F5', '#F0FDF4', '#EFF6FF', '#FAF5FF', '#FDF4FF', '#FFFBEB', '#F8FAFC', '#ECFEFF'];

        // --- 아이콘 모음 ---
        const IconBase = ({ children, color = "currentColor", size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></IconBase>;
        const RotateCcw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"></path><path d="M3 3v9h9"></path></IconBase>;
        const Check = (props) => <IconBase {...props}><polyline points="20 6 9 17 4 12"></polyline></IconBase>;
        const XIcon = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconBase>;
        const Star = ({ fill, ...props }) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill={fill || "none"}></polygon></IconBase>;
        const Trophy = (props) => <IconBase {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M12 15a7 7 0 0 0 7-7c0-2-3-2-3-2h-8s-3 0-3 2a7 7 0 0 0 7 7z"></path><path d="M12 15v7"></path></IconBase>;
        const CalendarIcon = (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconBase>;
        const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></IconBase>;
        const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></IconBase>;
        const Palette = (props) => <IconBase {...props}><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></IconBase>;
        const Scissors = (props) => <IconBase {...props}><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></IconBase>;
        const Zap = (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></IconBase>;
        const Target = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></IconBase>;
        const Hash = (props) => <IconBase {...props}><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line><line x1="10" y1="3" x2="8" y2="21"></line><line x1="16" y1="3" x2="14" y2="21"></line></IconBase>;
        const Compass = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></IconBase>;
        const PenTool = (props) => <IconBase {...props}><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></IconBase>;
        const FileText = (props) => <IconBase {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></IconBase>;
        const Trash = (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></IconBase>;
        const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></IconBase>;
        const Upload = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></IconBase>;
        const Banknote = (props) => <IconBase {...props}><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></IconBase>;
        const Eye = (props) => <IconBase {...props}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></IconBase>;
        const ShoppingBag = (props) => <IconBase {...props}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></IconBase>;
        const Camera = (props) => <IconBase {...props}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;
        const Quote = (props) => <IconBase {...props}><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></IconBase>;
        const BookA = (props) => <IconBase {...props}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="m8 11 2-6 2 6"/><path d="M9 9h2"/></IconBase>;
        const Cloud = (props) => <IconBase {...props}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></IconBase>;
        const Sun = (props) => <IconBase {...props}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></IconBase>;
        const CloudRain = (props) => <IconBase {...props}><line x1="16" y1="13" x2="16" y2="21"></line><line x1="8" y1="13" x2="8" y2="21"></line><line x1="12" y1="15" x2="12" y2="23"></line><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"></path></IconBase>;
        const Snowflake = (props) => <IconBase {...props}><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line><path d="m20 4-2.5 2.5"/><path d="m4 20 2.5-2.5"/><path d="m4 4 2.5 2.5"/><path d="m20 20-2.5-2.5"/></IconBase>;

        // --- 전역 스타일 최적화 ---
        const styles = {
            container: "min-h-screen flex flex-col items-center px-4 pt-2 pb-10 font-sans select-none touch-manipulation transition-colors duration-500",
            card: "w-full max-w-md bg-white/95 backdrop-blur-sm rounded-3xl shadow-xl p-6 flex flex-col items-center transition-all duration-300 relative",
            button: "w-full py-4 text-xl font-bold rounded-2xl transition-transform active:scale-95 shadow-md flex items-center justify-center gap-2 border-b-4 active:border-b-0 mb-2",
            instruction: "text-xl text-gray-700 mb-6 text-center font-bold break-keep leading-snug bg-white/80 px-4 py-3 rounded-xl w-full shadow-sm border border-gray-100",
            feedbackOverlay: "fixed inset-0 flex items-center justify-center bg-black/30 z-50 pointer-events-none animate-fade-in",
            input: "w-full text-center text-3xl font-bold py-4 border-b-4 border-gray-300 focus:border-green-500 outline-none bg-transparent mb-8"
        };

        const praises = ["정말 대단하세요!", "최고입니다!", "아주 훌륭해요!", "뇌가 젊어지고 있어요!", "완벽합니다!", "참 잘하셨어요!", "실력이 좋으시네요!", "놀라운 집중력입니다!"];
        const greetings = ["오늘도 멋진 하루 되세요", "기분 좋은 하루입니다", "두뇌가 반짝반짝 빛나요", "활기차게 시작해볼까요?", "오늘도 화이팅입니다", "미소가 아름다운", "항상 응원합니다", "행복이 가득한 하루 되세요"];

        // 점수별 레벨업 정보 (다양하고 예쁜 아이콘)
        const getLevelInfo = (score) => {
            if (score >= 500) return { icon: "👑", text: "두뇌 왕", msg: "마스터 등극! 완벽해요!" };
            if (score >= 400) return { icon: "💎", text: "보석", msg: "반짝반짝 빛나는 두뇌!" };
            if (score >= 300) return { icon: "🌳", text: "큰 나무", msg: "최고의 두뇌! 대단해요!" };
            if (score >= 200) return { icon: "🌻", text: "만개한 꽃", msg: "놀라운 집중력입니다!" };
            if (score >= 100) return { icon: "🌷", text: "꽃봉오리", msg: "정말 훌륭합니다!" };
            if (score >= 50)  return { icon: "🌿", text: "새싹", msg: "쑥쑥 자라고 있어요!" };
            return { icon: "🌱", text: "씨앗", msg: "시작이 반이에요! 화이팅!" };
        };

        // --- 0. 이름 입력 화면 ---
        const NameInputScreen = ({ onNameSubmit, playSound }) => {
            const [inputVal, setInputVal] = useState('');
            return (
                <div className="flex flex-col items-center w-full animate-zoom-in mt-10">
                    <div className="text-7xl mb-6 drop-shadow-md">🌸</div>
                    <h2 className="text-3xl font-bold text-gray-800 mb-8 text-center">반갑습니다!<br/>성함이 어떻게 되시나요?</h2>
                    <input type="text" className={styles.input} placeholder="이름 입력" value={inputVal} onChange={(e) => setInputVal(e.target.value)} />
                    <button onClick={() => { if (inputVal.trim().length > 0) { playSound('click'); onNameSubmit(inputVal); }}} disabled={inputVal.trim().length === 0} className={`${styles.button} py-5 ${inputVal.trim().length > 0 ? 'bg-green-500 text-white border-green-700' : 'bg-gray-200 text-gray-400 border-gray-300'}`}>확인</button>
                </div>
            );
        };

        // --- 1. 일기장 (Daily Record) ---
        const DailyRecord = ({ onBack, playSound }) => {
            const [view, setView] = useState('list'); 
            const [diaries, setDiaries] = useState([]);
            const [inputData, setInputData] = useState({ date: '', meals: '', activities: '', weather: '' });
            const [selectedDiary, setSelectedDiary] = useState(null);
            const fileInputRef = useRef(null);

            const weatherOptions = [
                { id: 'sunny', label: '맑음', icon: <Sun className="text-orange-500" /> },
                { id: 'cloudy', label: '흐림', icon: <Cloud className="text-gray-500" /> },
                { id: 'rainy', label: '비', icon: <CloudRain className="text-blue-500" /> },
                { id: 'snowy', label: '눈', icon: <Snowflake className="text-sky-300" /> }
            ];

            useEffect(() => {
                const saved = localStorage.getItem('brain_training_diaries');
                if (saved) { try { setDiaries(JSON.parse(saved)); } catch (e) {} }
            }, []);

            const saveToStorage = (newDiaries) => {
                setDiaries(newDiaries);
                localStorage.setItem('brain_training_diaries', JSON.stringify(newDiaries));
            };

            const handleWriteClick = () => {
                playSound('click');
                const today = new Date().toISOString().split('T')[0];
                setInputData({ date: today, meals: '', activities: '', weather: '' });
                setView('write');
            };

            const handleSave = () => {
                if (!inputData.date) return;
                playSound('click');
                const newEntry = { ...inputData, id: Date.now() };
                const newDiaries = [newEntry, ...diaries].sort((a, b) => new Date(b.date) - new Date(a.date));
                saveToStorage(newDiaries);
                setView('list');
            };

            const handleItemClick = (diary) => {
                playSound('click');
                setSelectedDiary(diary);
                setView('read');
            };

            const handleDelete = () => {
                if(window.confirm('이 기록을 삭제하시겠습니까?')) {
                    playSound('click');
                    const newDiaries = diaries.filter(d => d.id !== selectedDiary.id);
                    saveToStorage(newDiaries);
                    setView('list');
                }
            };

            const exportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(diaries));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href",     dataStr);
                downloadAnchorNode.setAttribute("download", "두뇌튼튼_일기백업_" + new Date().toISOString().slice(0,10) + ".json");
                document.body.appendChild(downloadAnchorNode); 
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importData = (event) => {
                const fileReader = new FileReader();
                fileReader.readAsText(event.target.files[0], "UTF-8");
                fileReader.onload = e => {
                    try {
                        const loadedData = JSON.parse(e.target.result);

                setTimeout(() => setFeedback(null), 1000);
            };

            const handleCorrect = (points) => { showFeedback(true); setScore(s => s + points); };
            const handleWrong = () => { showFeedback(false); };

            const startDailyCourse = () => {
                const allGames = ['math', 'word', 'money', 'wordMemory', 'spatial', 'nostalgia', 'grocery', 'reverse', 'stroop', 'memory', 'number', 'rps', 'reaction', 'category', 'direction'];
                const randomGames = allGames.sort(() => Math.random() - 0.5).slice(0, 5);
                setGameQueue([...randomGames, 'result']);
                setCurrentQueueIdx(0); setScore(0); setGameMode('course'); 
                setBgIndex(Math.floor(Math.random() * pastelBackgrounds.length));
                setGameState(randomGames[0]); playSound('click');
            };

            const startSingleGame = (gameType) => {
                setGameQueue([gameType, 'result']); setCurrentQueueIdx(0); setScore(0); setGameMode('single'); 
                setBgIndex(Math.floor(Math.random() * pastelBackgrounds.length));
                setGameState(gameType); playSound('click');
            };

            const handleStageComplete = () => {
                const nextIdx = currentQueueIdx + 1;
                if (nextIdx < gameQueue.length) { 
                    setCurrentQueueIdx(nextIdx); 
                    setBgIndex(Math.floor(Math.random() * pastelBackgrounds.length));
                    setGameState(gameQueue[nextIdx]); 
                }
            };
            
            // 오류 방지: confirm 없이 즉시 이동
            const goBackToMenu = () => { 
                playSound('click');
                setBgIndex(Math.floor(Math.random() * pastelBackgrounds.length));
                setGameState('menu'); 
                setScore(0); 
            };

            if (gameState === 'loading') return <div className={styles.container}></div>;

            const levelInfo = getLevelInfo(score);

            return (
                <div className={styles.container}>
                    {gameState !== 'nameInput' && (
                        <div className="w-full max-w-md px-2 pt-2 pb-2 flex flex-col gap-2 animate-fade-in z-10">
                            <div className="flex justify-between items-center w-full">
                                <div className="flex items-center gap-2">
                                    {/* 홈 버튼 오류 완전 해결 (직접 이동) */}
                                    {gameState !== 'menu' && gameState !== 'result' && gameState !== 'orientation' && (
                                        <button onClick={goBackToMenu} className="bg-white text-indigo-700 font-black py-2 px-4 rounded-full shadow-sm flex items-center gap-1 active:scale-95 border-2 border-indigo-200" title="메뉴로">
                                            <Home size={20} /> 홈
                                        </button>
                                    )}
                                    <span className="text-lg font-black text-indigo-700 bg-white px-4 py-2 rounded-full shadow-sm border-2 border-indigo-100 flex items-center gap-1">🌸 {userName}</span>
                                </div>
                                <button onClick={() => setSoundEnabled(!soundEnabled)} className="text-gray-500 p-2.5 bg-white rounded-full shadow-sm border border-gray-100">
                                    {soundEnabled ? <Volume2 size={24} /> : <div className="relative"><Volume2 size={24} className="opacity-50"/><XIcon size={16} className="absolute -top-1 -right-1"/></div>}
                                </button>
                            </div>
                            
                            {/* 동기부여 점수 레벨 바 */}
                            {gameState !== 'menu' && gameState !== 'record' && gameState !== 'result' && gameState !== 'english' && gameState !== 'reading' && (
                                <div className="bg-white px-4 py-3 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <span className="text-3xl">{levelInfo.icon}</span>
                                        <span className="font-bold text-amber-600 text-2xl">{score}점</span>
                                    </div>
                                    <span className="text-sm font-bold text-green-700 bg-green-50 px-3 py-1.5 rounded-lg border border-green-100">{levelInfo.msg}</span>
                                </div>
                            )}
                        </div>
                    )}

                    <div className={`${styles.card} mt-2 min-h-[550px] justify-start relative pb-12`}>
                        {gameState === 'nameInput' && <NameInputScreen onNameSubmit={handleNameSubmit} playSound={playSound} />}
                        {gameState === 'menu' && <GameMenu userName={userName} onStartCourse={startDailyCourse} onSelectGame={startSingleGame} onOpenFeature={(feat) => {setGameState(feat); playSound('click');}} />}
                        
                        {gameState === 'record' && <DailyRecord onBack={goBackToMenu} playSound={playSound} />}
                        {gameState === 'english' && <EnglishWordFeature onBack={goBackToMenu} />}
                        {gameState === 'reading' && <ReadingFeature onBack={goBackToMenu} />}
                        
                        {gameState === 'orientation' && <OrientationGame onComplete={handleOrientationComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        
                        {gameState === 'math' && <MathGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'word' && <WordGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'nostalgia' && <NostalgiaGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'grocery' && <GroceryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} playSound={playSound} />}
                        {gameState === 'reverse' && <ReverseWordGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'money' && <MoneyGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'wordMemory' && <WordMemoryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'spatial' && <SpatialGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'stroop' && <StroopGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'memory' && <MemoryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} playSound={playSound} />}
                        {gameState === 'number' && <NumberGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'rps' && <RPSGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'reaction' && <ReactionGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'category' && <CategoryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'direction' && <DirectionGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        
                        {gameState === 'result' && <ResultScreen score={score} userName={userName} mode={gameMode} onRestart={goBackToMenu} playSound={playSound} />}

                        {feedback && (
                            <div className={styles.feedbackOverlay}>
                                {feedback.type === 'correct' ? 
                                    <div className="bg-white/95 p-8 rounded-3xl shadow-2xl animate-bounce-short flex flex-col items-center"><div className="w-24 h-24 rounded-full bg-green-100 flex items-center justify-center mb-2"><Check size={48} className="text-green-600" strokeWidth={4}/></div><p className="text-green-600 font-black text-3xl mb-2">정답!</p><p className="text-gray-600 font-bold text-xl">{feedback.msg}</p></div> 
                                    : <div className="bg-white/95 p-8 rounded-3xl shadow-2xl animate-bounce-short flex flex-col items-center"><div className="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mb-2"><XIcon size={48} className="text-red-500" strokeWidth={4}/></div><p className="text-red-500 font-black text-3xl mb-2">땡!</p><p className="text-gray-600 font-bold text-xl">{feedback.msg}</p></div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
