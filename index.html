    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // 파스텔톤 배경색 리스트 (눈이 편안한 색상)
        const pastelBackgrounds = ['#FFF5F5', '#F0FDF4', '#EFF6FF', '#FAF5FF', '#FDF4FF', '#FFFBEB', '#F8FAFC', '#ECFEFF'];

        // 100세트 읽을거리 데이터 (소설 70개, 시 30개)
        const ALL_READINGS = [
            // --- 짧은 소설 / 수필 (70개) ---
            { t: "봄날의 자전거", a: "따뜻한 기억", c: "창고 구석에 먼지 쌓인 낡은 자전거를 닦았습니다. 어린 시절 아버지가 뒤에 태워주시던 그 넓고 따뜻했던 등이 떠올라 입가에 미소가 번졌습니다. 기억은 시간이 지나도 낡지 않습니다." },
            { t: "붕어빵 아주머니의 덤", a: "일상의 온기", c: "매서운 찬 바람이 부는 퇴근길, 모락모락 김이 나는 붕어빵을 샀습니다. 아주머니는 춥다며 하나를 더 얹어 주셨습니다. 천 원짜리 몇 장에 꽁꽁 언 마음까지 스르르 녹아내렸습니다." },
            { t: "두 개의 화분", a: "말의 힘", c: "베란다의 두 화분 중 하나에는 매일 '예쁘다' 말해주고, 다른 하나는 무관심하게 두었습니다. 한 달 뒤, 사랑을 받은 화분만이 꽃을 피웠습니다. 따뜻한 말 한마디는 생명을 피우는 마법입니다." },
            { t: "할머니의 된장찌개", a: "그리운 맛", c: "오랜만에 찾은 시골집. 굽은 허리로 끓여주신 보글보글 된장찌개에는 식당에서 흉내 낼 수 없는 깊은 맛이 있었습니다. 그것은 바로 가족을 향해 푹 끓여낸 '시간과 정성'의 맛이었습니다." },
            { t: "잃어버린 열쇠", a: "소중함의 발견", c: "며칠을 찾아 헤매던 서랍장 열쇠를 소파 밑에서 발견한 날, 세상을 다 얻은 듯 기뻤습니다. 우리는 종종 잃어버리고 나서야 그것이 내게 있었다는 사실을 깨닫고 감사합니다." },
            { t: "낡은 사진관의 미소", a: "빛나는 순간", c: "백발의 노부부가 낡은 사진관 문을 열고 들어왔습니다. '우리 영감탱이가 예쁘게 찍어준다며 데려왔수.' 터지는 플래시 불빛 아래, 두 분의 얼굴엔 갓 피어난 청춘이 가득했습니다." },
            { t: "비 오는 날의 우산", a: "친절의 릴레이", c: "갑작스런 소나기에 발을 동동 구르던 제게, 한 신사가 낡은 우산을 건네주며 말했습니다. '비가 그치면 다음 사람에게 이 우산을 건네주세요.' 비가 와도 세상은 참 따뜻합니다." },
            { t: "작은 쉼표 하나", a: "마음의 여유", c: "악보에 쉼표가 없으면 음악은 그저 시끄러운 소음이 됩니다. 끊임없이 달려가는 우리 삶에도 가만히 하늘을 보는 1분의 쉼표가 필요합니다. 그 쉼표가 내일의 힘찬 선율을 만듭니다." },
            { t: "아침을 여는 인사", a: "행복의 시작", c: "매일 아침 골목을 쓰는 경비 아저씨께 먼저 건넨 '수고하십니다' 한마디. 아저씨의 환한 미소로 돌아온 그 인사가 오늘 하루를 눈부시게 시작하는 최고의 보약이 되었습니다." },
            { t: "늦깎이 학생의 눈물", a: "배움의 기쁨", c: "일흔이 넘어 한글을 배운 할머니는 처음 자기 이름을 삐뚤빼뚤 적고는 아이처럼 우셨습니다. '이제 손주한테 편지를 쓸 수 있어.' 배움에는 결코 늦은 나이란 없습니다." },
            { t: "어머니의 굳은살", a: "가족의 무게", c: "우연히 잡은 어머니의 손은 나무껍질처럼 거칠고 굳은살이 배어 있었습니다. 거친 그 손이야말로 평생 우리 가족을 비바람으로부터 막아준 가장 부드럽고 위대한 방패였습니다." },
            { t: "옥상 평상의 달빛", a: "여름밤의 추억", c: "모기향 연기가 피어오르고 수박을 베어 물던 옛날 옥상 평상. 쏟아질 듯한 별을 보며 듣던 할머니의 옛날이야기가 그립습니다. 그때 우리는 참 가난했지만 넘치게 행복했습니다." },
            { t: "서랍 속의 편지", a: "변치 않는 마음", c: "책상 깊은 곳에서 이십 년 전 아버지가 쓰신 편지를 발견했습니다. '우리 딸, 아빠는 널 믿는다.' 빛바랜 잉크 위로 눈물이 툭 떨어졌습니다. 사랑은 세월이 흘러도 바래지 않습니다." },
            { t: "이웃집 호박전", a: "정의 나눔", c: "새로 이사 온 새댁이 쑥스럽게 내민 모락모락 김이 나는 호박전 한 접시. 그날 저녁, 우리 집 식탁의 갈치구이가 빈 접시에 담겨 건너갔습니다. 닫힌 문 너머로 정이 오가는 하루입니다." },
            { t: "마법의 안경", a: "긍정의 힘", c: "늘 웃고 다니는 할아버지에게 비결을 묻자 대답하셨습니다. '나는 매일 아침 눈을 뜰 때, 오늘은 어떤 좋은 일이 일어날까 기대하며 하루를 시작한다네.' 행복은 내 시선 속에 있습니다." },
            { t: "시계의 태엽", a: "마음 다듬기", c: "매일 아침 괘종시계의 태엽을 정성스레 감던 할아버지. '시계도 사람과 같아서 매일 만져줘야 시간이 맞는다네.' 우리의 마음도 매일 아침 단단히 태엽을 감아주는 의식이 필요합니다." },
            { t: "다리미와 주름", a: "인생의 흔적", c: "뜨거운 숯불 인두로 빳빳하게 옷을 다리던 어머니. 옷의 주름은 펴졌지만 어머니의 이마엔 세월의 주름이 깊어졌습니다. 그 주름 덕분에 지금의 우리가 반듯하게 서 있습니다." },
            { t: "시장의 칼국수", a: "위로의 국물", c: "지치고 힘든 퇴근길, 시장 구석의 칼국수 한 그릇을 비웠습니다. 투박하게 썰어낸 면발과 진한 국물이 뱃속을 든든하게 채우자, 내일 다시 살아갈 힘이 불끈 솟아났습니다." },
            { t: "햇살 한 줌", a: "소박한 위로", c: "흐린 날이 계속되다 구름 사이로 잠시 비춘 햇살 한 줌. 그 짧은 빛내림에 우울했던 마음이 사르르 녹았습니다. 우리 인생도 가끔 비추는 찰나의 햇살로 살아갈 힘을 얻곤 합니다." },
            { t: "낡은 구두", a: "발자취", c: "밑창이 다 닳은 낡은 구두를 버리지 못합니다. 그 안에는 내가 걸어온 치열했던 청춘과 무수한 땀방울이 고스란히 담겨 있기 때문입니다. 구두는 내 인생의 훌륭한 훈장입니다." },
            { t: "아버지의 기침 소리", a: "가족의 안도", c: "새벽녘 거실에서 들려오는 아버지의 헛기침 소리. 어릴 적엔 그 소리에 놀라 잠에서 깼지만, 지금은 그 소리가 들려야 비로소 '아, 오늘도 우리 집은 평안하구나' 안도하게 됩니다." },
            { t: "아궁이의 온기", a: "따뜻한 추억", c: "추운 겨울, 매캐한 연기를 마시며 아궁이에 불을 지피던 시절. 장작이 타닥타닥 타들어 가는 소리와 함께 아랫목으로 스며들던 그 뜨끈한 온기는 평생 잊지 못할 포근함입니다." },
            { t: "첫눈 오는 날", a: "설렘", c: "나이가 들어도 첫눈이 내리는 날엔 왠지 모르게 마음이 들뜹니다. 온 세상을 하얗게 덮어버리는 눈을 보며, 내 마음속 묵은 걱정들도 하얗게 씻겨 내려가는 기분이 듭니다." },
            { t: "장독대의 항아리", a: "기다림의 미학", c: "햇빛과 바람, 그리고 기나긴 시간이 만들어내는 장맛. 장독대 항아리 속에서 묵묵히 익어가는 장처럼, 우리네 삶의 지혜도 오랜 기다림 속에서 비로소 깊은 맛을 냅니다." },
            { t: "손편지의 감동", a: "진심의 온도", c: "스마트폰 메시지에 익숙해진 요즘, 우편함에 꽂힌 삐뚤빼뚤한 손편지 한 통. 꾹꾹 눌러 쓴 글씨체에서 잉크 냄새와 함께 보낸 이의 따뜻한 체온이 그대로 전해져 왔습니다." },
            { t: "달팽이의 걸음", a: "나만의 속도", c: "비 온 뒤 담벼락을 느릿느릿 기어가는 달팽이. 남들보다 빠르진 않지만, 뒤돌아보면 자신이 지나온 자리에 반짝이는 흔적을 남깁니다. 우리 인생도 달팽이처럼 나만의 속도로 가면 됩니다." },
            { t: "동네 목욕탕", a: "정겨운 수다", c: "뜨거운 온탕에 몸을 담그면 '으아, 시원하다' 소리가 절로 납니다. 모르는 사람과도 등 때를 밀어주며 살아가는 이야기를 나누는 동네 목욕탕은 몸과 마음의 때를 벗기는 안식처입니다." },
            { t: "가을 단풍", a: "아름다운 마무리", c: "푸르던 잎이 떨어지기 전, 가장 붉고 찬란하게 타오르는 단풍. 인생의 황혼기도 저 단풍처럼 내면의 지혜와 여유로 세상에서 가장 아름답게 물들어가는 시기입니다." },
            { t: "가마솥 밥맛", a: "어머니의 정성", c: "타닥타닥 장작불에 지어낸 가마솥 밥, 그리고 바닥에 눌어붙은 구수한 누룽지. 밥알 하나하나에 배어있던 어머니의 정성은 세상 어떤 진수성찬과도 바꿀 수 없는 맛입니다." },
            { t: "눈사람", a: "동심", c: "손이 시린 줄도 모르고 연탄재와 눈을 뭉쳐 눈사람을 만들던 어린 시절. 솔잎으로 눈썹을 달아주며 까르르 웃던 그 순수한 동심이, 오늘은 눈보라와 함께 문득 그립습니다." },
            { t: "창가의 제라늄", a: "생명력", c: "화분에 물 주는 것을 깜빡해 시들어버린 줄 알았던 제라늄이, 물을 흠뻑 먹고 며칠 뒤 작은 붉은 꽃망울을 터뜨렸습니다. 생명의 질긴 의지는 내게 다시 시작할 용기를 줍니다." },
            { t: "다방 커피", a: "여유 한 잔", c: "설탕 둘, 프림 둘. 낡은 소파에 앉아 김 마담이 타주던 달달한 다방 커피 한 잔. 힘든 농사일 중간에 마시던 그 커피 한 잔은 고단한 삶을 달래주는 최고의 피로회복제였습니다." },
            { t: "할아버지의 지팡이", a: "든든한 버팀목", c: "모서리가 반질반질하게 닳은 나무 지팡이. 할아버지의 무거운 걸음을 평생 지탱해준 그 지팡이는, 이제 우리 가족의 마음을 든든하게 받쳐주는 정신적 버팀목으로 남았습니다." },
            { t: "봄의 전령사", a: "희망", c: "아직 찬 바람이 매서운 2월 말, 양지바른 담벼락 밑에 노랗게 고개를 내민 복수초 한 송이. 가장 먼저 봄을 알리는 그 작은 꽃잎에서 매서운 추위를 이겨낸 희망을 봅니다." },
            { t: "어릴 적 운동회", a: "추억의 달리기", c: "만국기가 나부끼고, 어머니가 정성껏 싸오신 김밥 냄새가 진동하던 가을 운동회. 꼴찌를 해도 가족이 함께라서 그저 즐겁고 행복했던, 다시 돌아가고 싶은 가슴 벅찬 하루입니다." },
            { t: "시골집 마루", a: "여름밤의 휴식", c: "매미 소리가 귓가를 맴도는 여름밤, 반들반들하게 닦인 대청마루에 누워 별을 셉니다. 간간이 불어오는 시원한 밤바람에 한낮의 열기와 걱정이 씻은 듯이 날아갑니다." },
            { t: "엄마의 바느질", a: "사랑의 수선", c: "구멍 난 양말, 무릎이 해진 바지. 엄마의 낡은 재봉틀과 바늘만 지나가면 신기하게도 새 옷이 되었습니다. 우리네 상처 난 마음도 엄마의 품에 안기면 말끔하게 꿰매어집니다." },
            { t: "첫눈의 기억", a: "설레임", c: "세상을 하얗게 덮는 첫눈이 내리면, 꽁꽁 얼었던 마음마저 포근해집니다. 강아지처럼 동네를 뛰놀던 어린 시절의 내가 눈앞에 아른거려 나도 모르게 미소를 짓게 됩니다." },
            { t: "오래된 라디오", a: "위안의 소리", c: "주파수를 맞출 때마다 지지직 소리가 나는 낡은 라디오. 이불속에서 숨죽여 듣던 밤늦은 사연과 흘러간 옛 가요들은, 지금도 눈을 감으면 어제 일처럼 생생하게 내 귓가에 따스하게 울려 퍼집니다." },
            { t: "시래기 국밥", a: "소박한 행복", c: "찬 바람에 얼린 시래기를 푹 삶아 끓여낸 국밥 한 그릇. 특별한 반찬이 없어도 구수한 냄새 하나만으로 얼어붙은 몸과 마음을 따스하게 채워주는 소박하고도 완벽한 한 끼입니다." },
            { t: "고향집 감나무", a: "그리움", c: "가을이면 지붕 위로 붉은 홍시를 주렁주렁 매달던 마당의 큰 감나무. 새들을 위해 꼭 남겨두시던 까치밥에서, 말없이 베푸시던 할머니의 넉넉하고 따뜻한 인심을 배웁니다." },
            { t: "어머니의 보따리", a: "사랑의 무게", c: "명절 끝에 고향을 떠날 때면 어머니는 당신 먹을 것마저 죄다 싸서 무거운 보따리를 안겨주십니다. 무거워 낑낑대며 들고 온 그 보따리는, 평생을 자식을 위해 퍼주신 어머니 사랑의 무게입니다." },
            { t: "겨울밤 군고구마", a: "따뜻한 기다림", c: "찬 바람 부는 퇴근길, 아버지가 품속에 소중히 안고 오시던 군고구마가 담긴 노란 종이봉투. 손은 까매져도 호호 불며 온 가족이 나눠 먹던 그 달콤함은 어떤 고급 디저트와도 비교할 수 없습니다." },
            { t: "봄비", a: "생명의 속삭임", c: "마른 대지를 촉촉하게 적시는 봄비 내리는 소리. 땅속 깊은 곳에서 움츠렸던 새싹들이 봄비의 속삭임에 기지개를 켜며 세상 밖으로 나올 준비를 합니다." },
            { t: "낡은 일기장", a: "나와의 대화", c: "젊은 시절 썼던 일기장을 우연히 펼쳤습니다. 그 속에는 서툴지만 치열하게 고민했던 나의 모습이 고스란히 담겨 있었습니다. 훌륭하게 살아온 스스로를 칭찬해주고 싶습니다." },
            { t: "할아버지의 안경", a: "세상을 보는 지혜", c: "코 받침이 낡은 돋보기안경 너머로 신문을 읽으시던 할아버지. 그 렌즈를 통해 세상을 꿰뚫어 보시던 연륜과 지혜는 지금의 저에게 올바른 길을 안내하는 등대가 됩니다." },
            { t: "시장통 떡볶이", a: "정겨운 간식", c: "추운 겨울, 시장 구석에서 하얀 김을 모락모락 내던 떡볶이와 어묵 국물. 동전 몇 닢으로 배를 든든하게 채우고 상인과 주고받던 따뜻한 정이 그립습니다." },
            { t: "자장가", a: "평온한 밤", c: "어릴 적 잠투정을 할 때면 어머니가 나지막이 불러주시던 '자장자장 우리 아기'. 세상 어떤 훌륭한 음악보다도 내 마음을 가장 빠르고 평온하게 달래주던 마법의 노래였습니다." },
            { t: "가을 들판", a: "황금빛 물결", c: "바람이 불 때마다 출렁이는 황금빛 벼 이삭들. 한여름의 뜨거운 태양과 모진 비바람을 견뎌내고 마침내 고개 숙인 벼들에서 진정한 겸손과 결실의 아름다움을 배웁니다." },
            { t: "손주와의 영상통화", a: "삶의 활력소", c: "화면 너머로 혀 짧은 소리를 내며 '할미 사랑해'라고 외치는 손주 녀석. 그 천진난만한 웃음 한 번이면 쑤시던 관절염도 잊은 채 세상에서 가장 행복한 사람이 됩니다." },
            { t: "오래된 부부", a: "동반자", c: "공원 벤치에 나란히 앉아 말없이 앞만 바라보는 노부부. 굳이 말을 하지 않아도 수십 년의 세월을 함께 건너온 두 사람 사이에는 공기보다 편안한 짙은 신뢰가 흐르고 있습니다." },
            { t: "따뜻한 보리차", a: "아침의 여유", c: "추운 겨울 아침, 김이 모락모락 나는 구수한 보리차 한 잔을 두 손으로 감싸 쥡니다. 목구멍을 타고 넘어가는 그 따뜻한 기운이 굳어있던 몸과 마음을 부드럽게 깨워줍니다." },
            { t: "낡은 스웨터", a: "포근함", c: "유행은 한참 지났지만 버릴 수 없는 낡은 털 스웨터. 군데군데 보풀이 일어났어도, 입을 때마다 나를 감싸주던 그 익숙하고 부드러운 포근함은 새 옷이 결코 줄 수 없는 위안입니다." },
            { t: "바다의 파도", a: "끝없는 도전", c: "수만 번 바위에 부딪히고 부서져도 멈추지 않고 다시 밀려오는 파도. 우리의 인생도 넘어짐을 두려워하지 않고 끊임없이 나아가는 저 파도를 닮아야 하지 않을까요." },
            { t: "어머니의 기도", a: "무조건적 사랑", c: "새벽녘 정화수를 떠놓고 자식들의 안녕을 위해 두 손 모아 기도하시던 어머니. 지금 내가 무사히 살아가는 것은 모두 그 보이지 않는 간절한 기도의 힘 덕분입니다." },
            { t: "동네 점방", a: "작은 천국", c: "동전 몇 개를 쥐고 달려가던 어린 시절 동네 점방. 알록달록한 눈깔사탕과 장난감들로 가득했던 그곳은 꼬마들에게 세상 부러울 것 없는 작은 천국이었습니다." },
            { t: "저녁 노을", a: "아름다운 마침표", c: "하루의 끝자락, 온 하늘을 붉게 물들이며 조용히 산너머로 지는 태양. 치열하게 타올랐던 하루를 평온하게 마무리하는 노을처럼, 내 삶의 황혼기도 저렇게 아름답기를 소망합니다." },
            { t: "처마 밑 제비", a: "기다림", c: "봄비가 내리면 처마 밑 제비집을 올려다보시며 흐뭇하게 웃으시던 할머니. 입을 크게 벌리고 먹이를 기다리는 새끼 제비들을 보며, 당신의 새끼들 생각에 마음이 훈훈해지셨을 겁니다." },
            { t: "가을 편지", a: "그리움", c: "책갈피 사이에 예쁘게 말려둔 붉은 단풍잎 하나. 문득 멀리 있는 친구가 그리워져 펜을 들고 짧은 안부를 적어 내려갑니다. 찬 바람 부는 날, 편지 한 통이 작은 온기가 되기를." },
            { t: "비 온 뒤 무지개", a: "고난 뒤의 희망", c: "거센 천둥번개와 장대비가 쏟아진 후 맑게 갠 하늘에 그려진 일곱 빛깔 무지개. 우리의 삶도 힘든 고난의 폭풍우가 지나가면 반드시 눈부시고 찬란한 희망의 무지개가 뜰 것입니다." },
            { t: "모닥불", a: "타오르는 열정", c: "어두운 밤, 타닥타닥 소리를 내며 타오르는 모닥불. 차가운 공기를 데우며 불꽃을 피워내는 그 따뜻한 열정을 보며, 내 마음속 깊이 식어있던 작은 열정의 불씨를 다시 지펴봅니다." },
            { t: "우물가", a: "소통의 장소", c: "동틀 무렵 물동이를 지고 모여들던 동네 우물가. 찰랑이는 물소리와 함께 집안 대소사를 나누며 웃음꽃을 피우던 그 시절, 우리는 물보다 더 깊은 이웃 간의 정을 길어 올렸습니다." },
            { t: "봄나물", a: "싱그러운 생명", c: "아직 찬 바람이 남아있는 이른 봄, 밭둑에 쪼그려 앉아 냉이와 쑥을 캐던 날들. 흙내음 가득 묻은 봄나물 무침 한 접시에 집 나갔던 입맛이 돌아오고 싱그러운 생명력이 몸에 퍼집니다." },
            { t: "손때 묻은 밥상", a: "가족의 역사", c: "모서리가 닳고 동그란 국그릇 자국이 남은 오래된 나무 밥상. 그 밥상에 옹기종기 모여 앉아 서로의 숟가락이 부딪히던 소리야말로 우리 가족을 하나로 묶어준 세상 가장 아름다운 교향곡이었습니다." },
            { t: "시골집 마당", a: "마음의 고향", c: "강아지가 뛰어놀고 장독대가 햇살을 받으며 반짝이던 시골집 마당. 도시의 복잡한 빌딩 숲에 지칠 때면, 언제든 눈을 감고 마음의 고향인 그 평화로운 마당으로 돌아가 휴식을 취합니다." },
            { t: "겨울 동치미", a: "시원한 위로", c: "살얼음이 동동 뜬 겨울 동치미 한 그릇. 군고구마를 먹고 텁텁해진 입안을 단번에 개운하게 씻어 내려가던 그 톡 쏘는 시원함은, 복잡한 세상사에 답답해진 속을 뻥 뚫어주는 듯합니다." },
            { t: "할아버지의 자전거", a: "책임감", c: "무거운 짐칸이 달린 검은색 짐자전거. 장날마다 그 짐칸 가득 채소를 싣고 땀을 뻘뻘 흘리며 비탈길을 오르시던 할아버지의 뒷모습. 그것은 우리 가족을 짊어진 거룩한 책임감이었습니다." },
            { t: "고무줄놀이", a: "순수했던 시간", c: "전봇대 사이에 팽팽하게 고무줄을 매달고 해가 질 때까지 폴짝폴짝 뛰어오르던 골목길. 엄마의 밥 먹으란 부름에 아쉬운 발걸음을 돌리던, 걱정 없이 마냥 행복하고 순수했던 그 시절이 그립습니다." },
            { t: "비 온 뒤 흙내음", a: "자연의 치유", c: "소나기가 시원하게 대지를 적시고 지나간 후 피어오르는 비릿하고도 향긋한 흙내음. 그 어떤 값비싼 인공 향수보다도 내 마음을 차분하고 평온하게 만들어주는, 자연이 주는 최고의 치유입니다." },
            { t: "지하철의 꾸벅임", a: "수고에 대한 응원", c: "퇴근길 붐비는 지하철 안, 고개를 꾸벅이며 졸고 있는 누군가의 지친 어깨. 오늘 하루도 자신의 자리에서 치열하게 살아낸 모든 이들의 고단한 짐을 보며, 속으로 무언의 따뜻한 응원을 보냅니다." },
            
            // --- 명시 (30개) ---
            { t: "풀꽃", a: "나태주", c: "자세히 보아야\n예쁘다\n\n오래 보아야\n사랑스럽다\n\n너도 그렇다." },
            { t: "진달래꽃", a: "김소월", c: "나 보기가 역겨워\n가실 때에는\n말없이 고이 보내 드리우리다.\n\n영변에 약산\n진달래꽃,\n아름 따다 가실 길에 뿌리우리다.\n\n가시는 걸음 걸음\n놓인 그 꽃을\n사뿐히 즈려 밟고 가시옵소서." },
            { t: "서시", a: "윤동주", c: "죽는 날까지 하늘을 우러러\n한 점 부끄럼이 없기를,\n잎새에 이는 바람에도\n나는 괴로워했다.\n\n별을 노래하는 마음으로\n모든 죽어가는 것을 사랑해야지.\n그리고 나한테 주어진 길을\n걸어가야겠다." },
            { t: "먼 후일", a: "김소월", c: "먼 후일 당신이 찾으시면\n그때에 내 말이 '잊었노라'\n\n당신이 속으로 나무라면\n'무척 그리다가 잊었노라'\n\n그래도 당신이 나무라면\n'믿기지 않아서 잊었노라'" },
            { t: "흔들리며 피는 꽃", a: "도종환", c: "흔들리지 않고 피는 꽃이 어디 있으랴\n이 세상 그 어떤 아름다운 꽃들도\n다 흔들리면서 피었나니\n흔들리면서 줄기를 곧게 세웠나니\n흔들리지 않고 가는 사랑이 어디 있으랴" },

            { t: "엄마야 누나야", a: "김소월", c: "엄마야 누나야 강변 살자,\n뜰에는 반짝이는 금모래 빛,\n\n뒷문 밖에는 갈잎의 노래,\n엄마야 누나야 강변 살자." },
            { t: "별 헤는 밤", a: "윤동주", c: "계절이 지나가는 하늘에는\n가을로 가득 차 있습니다.\n\n나는 아무 걱정도 없이\n가을 속의 별들을 다 헤일 듯합니다.\n\n가슴 속에 하나 둘 새겨지는 별을\n이제 다 못 헤는 것은\n쉬이 아침이 오는 까닭이요..." },

            { t: "꽃", a: "김춘수", c: "내가 그의 이름을 불러주기 전에는\n그는 다만\n하나의 몸짓에 지나지 않았다.\n\n내가 그의 이름을 불러주었을 때\n그는 나에게로 와서\n꽃이 되었다." },
            { t: "그대 앞에 봄이 있다", a: "김종해", c: "우리 살아가는 일 속에\n파도치는 날 바람 부는 날이\n어디 한두 번이랴\n\n그런 날은 조용히 닻을 내리고\n오늘 일을 잠시라도\n낮은 곳에 묻어두어야 한다.\n\n그대 앞에 봄이 있다." },
            { t: "홀로서기", a: "서정윤", c: "기다림은\n만남을 목적으로 하지 않아도\n좋다.\n\n가슴이 아프면\n아픈 채로,\n바람이 불면\n고개를 높이 들고\n두 팔을 벌릴 것이다." },
            { t: "어떤 기쁨", a: "이해인", c: "때로는 아주 작은 일에\n눈물겹게 감동할 수 있는\n맑은 마음을 주시어\n\n감사합니다.\n살아있는 동안\n자주 느낄 수 있게 하소서." },

            { t: "봄", a: "이성부", c: "기다리지 않아도 오고\n기다림마저 잃었을 때에도 너는 온다.\n\n어디 뻘밭 구석이거나\n썩은 물웅덩이 같은 데를 기웃거리다가\n\n눈 부비며 너는 더디게 온다." },
            { t: "귀천", a: "천상병", c: "나 하늘로 돌아가리라.\n새벽빛 와 닿으면 스러지는\n이슬 더불어 손에 손을 잡고,\n\n아름다운 이 세상 소풍 끝나는 날,\n가서, 아름다웠더라고 말하리라..." },

            { t: "산유화", a: "김소월", c: "산에는 꽃 피네\n꽃이 피네\n갈 봄 여름 없이\n꽃이 피네\n\n산에\n산에\n피는 꽃은\n저만치 혼자서 피어 있네" },

            { t: "그리움", a: "유치환", c: "파도야 어쩌란 말이냐\n파도야 어쩌란 말이냐\n\n임은 뭍같이 까딱 않는데\n파도야 어쩌란 말이냐\n\n날 어쩌란 말이냐" },

                    <div className={`${styles.card} mt-2 min-h-[550px] justify-start relative pb-12`}>
                        {gameState === 'nameInput' && <NameInputScreen onNameSubmit={handleNameSubmit} playSound={playSound} />}
                        {gameState === 'menu' && <GameMenu userName={userName} onStartCourse={startDailyCourse} onSelectGame={startSingleGame} onOpenFeature={(feat) => {setGameState(feat); playSound('click');}} />}
                        
                        {gameState === 'record' && <DailyRecord onBack={goBackToMenu} playSound={playSound} />}
                        {gameState === 'english' && <EnglishWordFeature onBack={goBackToMenu} />}
                        {gameState === 'reading' && <ReadingFeature onBack={goBackToMenu} />}
                        
                        {gameState === 'orientation' && <OrientationGame onComplete={handleOrientationComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        
                        {gameState === 'math' && <MathGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'word' && <WordGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'nostalgia' && <NostalgiaGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'grocery' && <GroceryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} playSound={playSound} />}
                        {gameState === 'reverse' && <ReverseWordGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'money' && <MoneyGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'wordMemory' && <WordMemoryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'spatial' && <SpatialGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'stroop' && <StroopGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'memory' && <MemoryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} playSound={playSound} />}
                        {gameState === 'number' && <NumberGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'rps' && <RPSGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'reaction' && <ReactionGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'category' && <CategoryGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        {gameState === 'direction' && <DirectionGame onComplete={handleStageComplete} onCorrect={handleCorrect} onWrong={handleWrong} />}
                        
                        {gameState === 'result' && <ResultScreen score={score} userName={userName} onRestart={goBackToMenu} playSound={playSound} />}

                        {feedback && (
                            <div className={styles.feedbackOverlay}>
                                {feedback.type === 'correct' ? 
                                    <div className="bg-white/95 p-8 rounded-3xl shadow-2xl animate-bounce-short flex flex-col items-center"><div className="w-24 h-24 rounded-full bg-green-100 flex items-center justify-center mb-2"><Check size={48} className="text-green-600" strokeWidth={4}/></div><p className="text-green-600 font-black text-3xl mb-2">정답!</p><p className="text-gray-600 font-bold text-xl">{feedback.msg}</p></div> 
                                    : <div className="bg-white/95 p-8 rounded-3xl shadow-2xl animate-bounce-short flex flex-col items-center"><div className="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mb-2"><XIcon size={48} className="text-red-500" strokeWidth={4}/></div><p className="text-red-500 font-black text-3xl mb-2">땡!</p><p className="text-gray-600 font-bold text-xl">{feedback.msg}</p></div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
